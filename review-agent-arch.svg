  <rect x="240" y="394" width="200" height="36" rx="8" fill="#fafafa" stroke="#666" stroke-width="1"/>
  <text x="340" y="416" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Deduplication</text>

  <!-- Arrow 4 -->
  <line x1="340" y1="430" x2="340" y2="448" stroke="#bbb" stroke-width="1"/>
  <polygon points="336,445 340,452 344,445" fill="#bbb"/>

  <!-- Aggregator -->
  <rect x="240" y="454" width="200" height="44" rx="8" fill="#ede7f6" stroke="#512da8" stroke-width="1.2"/>
  <text x="340" y="473" text-anchor="middle" font-size="11" fill="#311b92" font-weight="600">Aggregator / Judge</text>
  <text x="340" y="488" text-anchor="middle" font-size="9" fill="#555">Opus 4.6 · validates against code</text>

</svg>
