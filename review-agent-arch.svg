  <rect x="495" y="218" width="120" height="22" rx="4" fill="#fff" stroke="#fff59d" stroke-width="0.8"/>
  <text x="555" y="233" text-anchor="middle" font-size="8" fill="#555">Run 1</text>
  <rect x="495" y="244" width="120" height="22" rx="4" fill="#fff" stroke="#fff59d" stroke-width="0.8"/>
  <text x="555" y="259" text-anchor="middle" font-size="8" fill="#555">Run 2</text>
  <rect x="495" y="270" width="120" height="22" rx="4" fill="#fff" stroke="#fff59d" stroke-width="0.8"/>
  <text x="555" y="285" text-anchor="middle" font-size="8" fill="#555">Run 3</text>

  <!-- Model labels -->
  <text x="125" y="310" text-anchor="middle" font-size="8" fill="#888">Sonnet 4.6</text>
  <text x="265" y="310" text-anchor="middle" font-size="8" fill="#888">Sonnet 4.6</text>
  <text x="415" y="310" text-anchor="middle" font-size="8" fill="#888">Sonnet 4.6</text>
  <text x="555" y="310" text-anchor="middle" font-size="8" fill="#888">Sonnet 4.6</text>

  <!-- Findings count -->
  <text x="340" y="360" text-anchor="middle" font-size="9" fill="#666" font-style="italic">~25-30 raw findings</text>

  <!-- Arrow 3 -->
  <line x1="340" y1="368" x2="340" y2="388" stroke="#bbb" stroke-width="1"/>
  <polygon points="336,385 340,392 344,385" fill="#bbb"/>

