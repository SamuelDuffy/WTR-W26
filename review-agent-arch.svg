<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="Inter, sans-serif">
  <!-- Background -->
  <rect width="680" height="520" fill="#fdfdfd" rx="8"/>

  <!-- PR Trigger -->
  <rect x="270" y="15" width="140" height="36" rx="18" fill="#fff3e0" stroke="#f0883e" stroke-width="1.2"/>
  <text x="340" y="37" text-anchor="middle" font-size="11" fill="#c45e00" font-weight="600">PR Trigger</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="51" x2="340" y2="70" stroke="#bbb" stroke-width="1"/>
  <polygon points="336,67 340,74 344,67" fill="#bbb"/>

  <!-- Context Builder -->
  <rect x="240" y="76" width="200" height="44" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
  <text x="340" y="95" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="600">Context Builder</text>
  <text x="340" y="110" text-anchor="middle" font-size="9" fill="#555">git diff, Jira, related files</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="120" x2="340" y2="140" stroke="#bbb" stroke-width="1"/>
  <polygon points="336,137 340,144 344,137" fill="#bbb"/>

  <!-- Sub-Agents Box -->
  <rect x="40" y="148" width="600" height="230" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="340" y="168" text-anchor="middle" font-size="11" fill="#4a148c" font-weight="600">Sub-Agents (4 lenses x 3 rounds = 12 parallel runs)</text>

  <!-- Agent columns -->
  <!-- Logic -->
  <rect x="65" y="182" width="120" height="30" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="125" y="201" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="600">Logic</text>
  <rect x="65" y="218" width="120" height="22" rx="4" fill="#fff" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="125" y="233" text-anchor="middle" font-size="8" fill="#555">Run 1</text>
  <rect x="65" y="244" width="120" height="22" rx="4" fill="#fff" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="125" y="259" text-anchor="middle" font-size="8" fill="#555">Run 2</text>
  <rect x="65" y="270" width="120" height="22" rx="4" fill="#fff" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="125" y="285" text-anchor="middle" font-size="8" fill="#555">Run 3</text>

  <!-- Security -->
  <rect x="205" y="182" width="120" height="30" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="265" y="201" text-anchor="middle" font-size="10" fill="#b71c1c" font-weight="600">Security</text>
  <rect x="205" y="218" width="120" height="22" rx="4" fill="#fff" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="265" y="233" text-anchor="middle" font-size="8" fill="#555">Run 1</text>
  <rect x="205" y="244" width="120" height="22" rx="4" fill="#fff" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="265" y="259" text-anchor="middle" font-size="8" fill="#555">Run 2</text>
  <rect x="205" y="270" width="120" height="22" rx="4" fill="#fff" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="265" y="285" text-anchor="middle" font-size="8" fill="#555">Run 3</text>

  <!-- Design -->
  <rect x="355" y="182" width="120" height="30" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1"/>
  <text x="415" y="201" text-anchor="middle" font-size="10" fill="#1a237e" font-weight="600">Design</text>
  <rect x="355" y="218" width="120" height="22" rx="4" fill="#fff" stroke="#9fa8da" stroke-width="0.8"/>
  <text x="415" y="233" text-anchor="middle" font-size="8" fill="#555">Run 1</text>
  <rect x="355" y="244" width="120" height="22" rx="4" fill="#fff" stroke="#9fa8da" stroke-width="0.8"/>
  <text x="415" y="259" text-anchor="middle" font-size="8" fill="#555">Run 2</text>
  <rect x="355" y="270" width="120" height="22" rx="4" fill="#fff" stroke="#9fa8da" stroke-width="0.8"/>
  <text x="415" y="285" text-anchor="middle" font-size="8" fill="#555">Run 3</text>

  <!-- Patterns -->
  <rect x="495" y="182" width="120" height="30" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
